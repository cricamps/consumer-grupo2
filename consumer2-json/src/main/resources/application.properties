server.port=8084
spring.application.name=consumer2-json

# =============================================
# RABBITMQ
# =============================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

app.rabbitmq.exchange=exchange_alertas_grupo2
app.rabbitmq.queue.oracle=cola_alertas_oracle_grupo2
app.rabbitmq.queue.json=cola_alertas_json_grupo2

# =============================================
# Carpeta donde se generan los .json de auditoria de alertas
# Local (Windows, fuera de Docker): C:/Medicas/alertas-json
# Docker: /data/alertas-json (montado como volumen en docker-compose.yml)
# =============================================
app.alertas.output-dir=${ALERTAS_OUTPUT_DIR:C:/Medicas/alertas-json}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
