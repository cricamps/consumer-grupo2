server.port=8082
spring.application.name=consumer1-oracle

# =============================================
# RABBITMQ - exchange fanout + colas (Sumativa S6)
# =============================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

app.rabbitmq.exchange=exchange_alertas_grupo2
app.rabbitmq.queue.oracle=cola_alertas_oracle_grupo2
app.rabbitmq.queue.json=cola_alertas_json_grupo2

# =============================================
# ORACLE - AlertasDB con Wallet
# =============================================
spring.datasource.url=jdbc:oracle:thin:@alertasdb_high?TNS_ADMIN=${TNS_ADMIN:C:/Medicas/Wallet_AlertasDB}
spring.datasource.username=ADMIN
spring.datasource.password=Alertas4569@
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.connection-init-sql=SELECT 1 FROM DUAL

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
