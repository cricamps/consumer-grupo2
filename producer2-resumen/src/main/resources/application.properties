server.port=8085
spring.application.name=producer2-resumen

# =============================================
# RABBITMQ - mismo exchange/colas que Productor 1
# =============================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

app.rabbitmq.exchange=exchange_alertas_grupo2
app.rabbitmq.queue.oracle=cola_alertas_oracle_grupo2
app.rabbitmq.queue.json=cola_alertas_json_grupo2

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
